<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Ray Hubbard Current Temp</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0d1117; color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 2rem; margin: 0;
        }
        .container { width: 100%; max-width: 900px; display: grid; gap: 1rem; }
        .sidebar {
            display: flex; flex-direction: column; gap: 1rem; align-items: flex-start;
        }
        .card {
            background-color: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; gap: 2rem;
            flex: 1;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; margin-left: auto; margin-right: auto; max-width: 400px; }
        .stat-box { background: #0d1117; padding: 1rem; border-radius: 8px; border: 1px solid #30363d; }
        .water-level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .water-box { background: #0d1117; padding: 1rem; border-radius: 8px; border: 1px solid #30363d; }
        h1 { font-size: 1rem; color: #8b949e; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .temp-main { font-size: 3.5rem; font-weight: bold; color: #3fb950; margin: 0.5rem 0; }
        .temp-sub { font-size: 1.5rem; font-weight: bold; color: #58a6ff; }
        .label { font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
        .status { font-size: 0.75rem; color: #484f58; margin-top: 10px; }
        .chart-container { height: 250px; margin-top: 15px; }
        .weather-card {
            background-color: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 1rem; margin-top: 1rem; text-align: center;
        }
        .rain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .rain-box { background: #0d1117; padding: 0.75rem; border-radius: 8px; border: 1px solid #30363d; }
        .hourly-table { width: 100%; border-collapse: collapse; margin-top: 0.75rem; }
        .hourly-table th, .hourly-table td { border: 1px solid #30363d; padding: 0.35rem 0.5rem; font-size: 0.75rem; }
        .hourly-temp { color: #3fb950; font-weight: bold; }
        .wind-col { color: #58a6ff; font-weight: 600; }
        .attribution { font-size: 1rem; color: #8b949e; text-align: center; line-height: 1.6; }
        .attribution a { color: #58a6ff; text-decoration: none; }
        .concerts-link {
            font-size: 1.3rem; font-weight: 600; color: #58a6ff; text-decoration: none;
            display: block; transition: all 0.3s ease;
            line-height: 1.5; min-width: 200px; text-align: center;
        }
        .concerts-link:hover {
            color: #79c0ff;
        }
        .main-content {
            display: flex; flex-direction: column; gap: 1rem; flex: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; gap: 1rem; align-items: flex-start;">
        <a href="https://www.rockwall.com/event_cbl.asp" target="_blank" class="concerts-link">Concerts by the Lake</a>
        <div class="main-content">
            <div class="card">
                <div style="text-align: center; width: 100%;">
                    <h1>Lake Ray Hubbard Water Temp</h1>
                    <div id="temp-display" class="temp-main">--.-°F</div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="label">5-DAY AVG</div>
                            <div id="yesterday-avg" class="temp-sub">--.-°F</div>
                        </div>
                        <div class="stat-box">
                            <div class="label">TREND</div>
                            <div id="trend-val" class="temp-sub">--</div>
                        </div>
                    </div>
                    <div class="water-level-grid">
                        <div class="water-box">
                            <div class="label">MEAN WATER LEVEL</div>
                            <div id="water-level" class="temp-sub">--.- ft</div>
                        </div>
                        <div class="water-box">
                            <div class="label">PERCENT FULL</div>
                            <div id="percent-full" class="temp-sub">--%</div>
                        </div>
                    </div>
                    <div id="last-update" class="status">Connecting...</div>
                    
                    <div class="chart-container">
                        <canvas id="tempChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="weather-card">
                <h2 style="font-size: 1rem; color: #8b949e; margin-bottom: 10px;">Local Weather Forecast</h2>
                <div class="rain-grid">
                    <div class="rain-box">
                        <div class="label">RAIN TODAY</div>
                        <div id="rain-today" class="temp-sub">-- in</div>
                    </div>
                    <div class="rain-box">
                        <div class="label">RAIN YESTERDAY</div>
                        <div id="rain-yesterday" class="temp-sub">-- in</div>
                    </div>
                </div>
                <div id="weather-forecast">Loading forecast...</div>
            </div>

            <div class="attribution">
                Hosting provided by <a href="https://lucidnetworkconsulting.com/" target="_blank">Lucid Network Consulting</a>
            </div>
        </div>
    </div>
</div>

<script>
    // Public URL - No Key Required
    const publicUrl = 'https://io.adafruit.com/api/v2/Manzacoty/feeds/dock-temperature/data.json';
    let tempChart;

    async function fetchData() {
        try {
            const response = await fetch(`${publicUrl}?limit=48`);
            if (!response.ok) throw new Error('Data fetch failed');

            const recentData = await response.json();
            if (!recentData.length) return;

            const latest = recentData[0];
            const currentTemp = parseFloat(latest.value).toFixed(1);
            document.getElementById('temp-display').innerText = `${currentTemp}°F`;
            document.getElementById('last-update').innerText = `Last Update: ${new Date(latest.created_at).toLocaleString()}`;

            // Calculation for 5-Day Average
            const now = new Date();
            const startDate = new Date(now);
            startDate.setDate(startDate.getDate() - 5);
            startDate.setHours(0,0,0,0);
            const endDate = new Date(now);
            endDate.setHours(23,59,59,999);

            // Fetching data for the last 5 days
            const rangeRes = await fetch(`${publicUrl}?start_time=${startDate.toISOString()}&end_time=${endDate.toISOString()}`);
            const fiveDayData = await rangeRes.json();
            
            if (fiveDayData.length > 0) {
                const sum = fiveDayData.reduce((acc, d) => acc + parseFloat(d.value), 0);
                const avg = (sum / fiveDayData.length).toFixed(1);
                document.getElementById('yesterday-avg').innerText = `${avg}°F`;
                const diff = (currentTemp - avg).toFixed(1);
                const trendEl = document.getElementById('trend-val');
                trendEl.innerText = diff > 0 ? `+${diff}°` : `${diff}°`;
                trendEl.style.color = diff < 0 ? "#f85149" : "#3fb950";
            }

            // Display hourly data for the past 12 hours
            const twelveHoursAgo = new Date(now.getTime() - (12 * 60 * 60 * 1000));
            const hourlyData = recentData.filter(d => new Date(d.created_at) >= twelveHoursAgo);
            
            const labels = hourlyData.slice().reverse().map(d => new Date(d.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
            const values = hourlyData.slice().reverse().map(d => parseFloat(d.value));

            if (tempChart) {
                tempChart.data.labels = labels;
                tempChart.data.datasets[0].data = values;
                tempChart.update();
            } else {
                renderChart(labels, values);
            }
        } catch (e) { 
            console.error("Fetch failed:", e);
            document.getElementById('temp-display').innerText = "Offline";
        }
    }

    function renderChart(labels, values) {
        const ctx = document.getElementById('tempChart').getContext('2d');
        tempChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: values, borderColor: '#58a6ff', backgroundColor: 'rgba(88, 166, 255, 0.1)',
                    fill: true, tension: 0.4, pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e', maxTicksLimit: 4 } }
                }
            }
        });
    }

    async function fetchWeather() {
        try {
            const res = await fetch('https://api.weather.gov/gridpoints/FWD/97,95/forecast/hourly');
            const data = await res.json();
            const periods = data.properties.periods.slice(0, 12);
            let html = '<table class="hourly-table"><tr><th>Time</th><th>Temp</th><th>Wind Speed</th><th>Direction</th><th>Rain %</th></tr>';
            periods.forEach(p => {
                const windSpeed = p.windSpeed || '--';
                const windDir = p.windDirection || '--';
                html += `<tr><td>${new Date(p.startTime).toLocaleTimeString([], {hour: 'numeric'})}</td><td class="hourly-temp">${p.temperature}°</td><td class="wind-col">${windSpeed}</td><td class="wind-col">${windDir}</td><td>${p.probabilityOfPrecipitation.value || 0}%</td></tr>`;
            });
            html += '</table>';
            document.getElementById('weather-forecast').innerHTML = html;
        } catch (e) { document.getElementById('weather-forecast').innerText = 'Weather currently unavailable'; }
    }

    async function fetchWaterLevel() {
        try {
            const targetUrl = 'https://waterdatafortexas.org/reservoirs/individual/ray-hubbard';
            const proxies = [
                'https://api.allorigins.win/raw?url=',
                'https://api.codetabs.com/v1/proxy?quest=',
                'https://thingproxy.freeboard.io/fetch/'
            ];
            let html = null;

            for (const proxy of proxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(targetUrl));
                    if (!response.ok) continue;
                    html = await response.text();
                    if (html && html.includes('Lake Ray Hubbard')) break;
                } catch (e) {
                    console.warn('Reservoir proxy fetch failed for', proxy, e);
                }
            }

            if (!html) {
                console.warn('Could not load reservoir data from any proxy; trying USGS fallback');
                const usgsRes = await fetch('https://waterservices.usgs.gov/nwis/iv/?format=json&sites=08061550&parameterCd=62614');
                if (usgsRes.ok) {
                    const usgsData = await usgsRes.json();
                    const point = usgsData?.value?.timeSeries?.[0]?.values?.[0]?.value?.[0];
                    if (point?.value) {
                        const waterLevel = parseFloat(point.value).toFixed(2);
                        document.getElementById('water-level').innerText = `${waterLevel} ft`;
                        document.getElementById('percent-full').innerText = 'N/A';
                        return;
                    }
                }
                throw new Error('Could not load reservoir data from any proxy or USGS fallback');
            }

            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const smallEl = doc.querySelector('h2 small');
                if (smallEl) {
                    const percentMatch = smallEl.textContent.trim().match(/([\d.]+)%\s*full/);
                    if (percentMatch) {
                        document.getElementById('percent-full').innerText = `${percentMatch[1]}%`;
                    }
                }

                const recentRow = Array.from(doc.querySelectorAll('tbody tr')).find(row => row.textContent.includes('Most recent'));
                if (recentRow) {
                    const cells = recentRow.querySelectorAll('td');
                    if (cells.length >= 3) {
                        const waterLevel = cells[2].textContent.trim();
                        document.getElementById('water-level').innerText = `${waterLevel} ft`;
                    }
                }
            } catch (e) {
                console.warn('Reservoir HTML parse failed, falling back to regex', e);
                const percentMatch = html.match(/<small>\s*([\d.]+)% full/);
                if (percentMatch) {
                    document.getElementById('percent-full').innerText = `${percentMatch[1]}%`;
                }

                const levelMatch = html.match(/<tr>\s*<td>\s*Most recent\s*<\/td>\s*<td>\s*[^<]+<\/td>\s*<td>\s*([0-9]+\.[0-9]+)/);
                if (levelMatch) {
                    document.getElementById('water-level').innerText = `${levelMatch[1]} ft`;
                }
            }
        } catch (e) {
            console.error("Water level fetch failed:", e);
            document.getElementById('water-level').innerText = "N/A";
            document.getElementById('percent-full').innerText = "N/A";
        }
    }

    async function fetchRainData() {
        try {
            // NOTE: To get rain data from Tempest, you need a personal access token
            // 1. Go to https://tempestwx.com and sign in
            // 2. Click on your station (170759)
            // 3. Go to Settings → Data Authorizations
            // 4. Click "Create Token" and give it a name
            // 5. Copy the token and replace 'YOUR_TOKEN_HERE' below
            const token = '3aae0040-1608-4d14-873e-cce7607e2509'; // Replace with your actual token
            const stationId = '170759'; // Your station ID
            
            if (token === 'YOUR_TOKEN_HERE') {
                document.getElementById('rain-today').innerText = "Token needed";
                document.getElementById('rain-yesterday').innerText = "Token needed";
                return;
            }
            
            const res = await fetch(`https://swd.weatherflow.com/swd/rest/observations/station/${stationId}?token=${token}`);
            const data = await res.json();
            
            if (data.obs && data.obs.length > 0) {
                const obs = data.obs[0];
                // Convert mm to inches (1 inch = 25.4 mm)
                const todayRain = (obs.precip_accum_local_day || 0) / 25.4;
                const yesterdayRain = (obs.precip_accum_local_yesterday_final || 0) / 25.4;
                document.getElementById('rain-today').innerText = `${todayRain.toFixed(2)} in`;
                document.getElementById('rain-yesterday').innerText = `${yesterdayRain.toFixed(2)} in`;
            }
        } catch (e) { 
            console.error("Rain data fetch failed:", e);
            document.getElementById('rain-today').innerText = "N/A";
            document.getElementById('rain-yesterday').innerText = "N/A";
        }
    }

</script>

<script>
    fetchData();
    fetchWeather();
    fetchWaterLevel();
    fetchRainData();
    setInterval(fetchData, 600000);
    setInterval(fetchWaterLevel, 1800000); // Update water level every 30 minutes
    setInterval(fetchRainData, 1800000); // Update rain data every 30 minutes
</script>
</body>
</html>
